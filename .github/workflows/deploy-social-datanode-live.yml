name: Promote social.datanode.live

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or commit SHA to promote to production
        required: true
        default: main

permissions:
  contents: write

concurrency:
  group: social-datanode-live-promotion
  cancel-in-progress: false

jobs:
  promote:
    name: Promote production ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve production ref
        env:
          DEPLOY_REF: ${{ inputs.ref }}
        run: |
          set -Eeuo pipefail

          git fetch --tags origin

          if target_sha="$(git rev-parse --verify --quiet "${DEPLOY_REF}^{commit}")"; then
            :
          elif target_sha="$(git rev-parse --verify --quiet "origin/${DEPLOY_REF}^{commit}")"; then
            :
          else
            git fetch --depth 1 origin "$DEPLOY_REF"
            target_sha="$(git rev-parse --verify "FETCH_HEAD^{commit}")"
          fi

          echo "TARGET_SHA=${target_sha}" >> "$GITHUB_ENV"
          git checkout --detach "$target_sha"

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify production ref
        run: npm run quality

      - name: Update production branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail

          if gh api "repos/${GITHUB_REPOSITORY}/git/ref/heads/production" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              "repos/${GITHUB_REPOSITORY}/git/refs/heads/production" \
              -f "sha=${TARGET_SHA}" \
              -F force=true
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref=refs/heads/production \
              -f "sha=${TARGET_SHA}"
          fi

          echo "Promoted ${TARGET_SHA} to production"
