name: Agent search eval

on:
  push:
    paths:
      - 'supabase/functions/graph-api/**'
      - 'src/lib/search/**'
      - 'scripts/test-agent-search-eval.mjs'
      - 'scripts/lib/synthetic-search-graph.mjs'
  pull_request:
    paths:
      - 'supabase/functions/graph-api/**'
      - 'src/lib/search/**'
      - 'scripts/test-agent-search-eval.mjs'
      - 'scripts/lib/synthetic-search-graph.mjs'

jobs:
  local-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: node ./scripts/test-agent-search-eval.mjs --people 300
