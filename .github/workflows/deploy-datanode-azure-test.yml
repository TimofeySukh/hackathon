name: Deploy Azure test app

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git branch, tag, or commit SHA to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: datanode-azure-test
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Azure Static Web App
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
      VITE_SUPABASE_ANON_KEY: ""

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Build
        run: |
          set -Eeuo pipefail

          required_vars=(
            VITE_SUPABASE_URL
            VITE_SUPABASE_PUBLISHABLE_KEY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name}" ]]; then
              echo "::error::Missing required variable ${var_name}"
              exit 1
            fi
          done

          npm ci --no-audit
          npm run build

      - name: Deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: dist
          skip_app_build: true
